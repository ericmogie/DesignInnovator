<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scrollwise – Transform Your Scroll Into Growth</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --bg-dark: #0a0e14;
      --bg-card: #141920;
      --bg-elevated: #1a1f2e;
      --accent: #00d4aa;
      --accent-2: #0099ff;
      --text: #ffffff;
      --text-secondary: #a0aec0;
      --text-tertiary: #718096;
      --border: rgba(255,255,255,0.08);
      --gradient: linear-gradient(135deg, #00d4aa 0%, #0099ff 100%);
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      position: fixed;
    }
    
    .app {
      max-width: 480px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #0f1419, #0a0e14);
    }
    
    .header {
      padding: max(env(safe-area-inset-top), 12px) 20px 12px;
      background: rgba(10,14,20,0.98);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 30px rgba(0,212,170,0.3);
      animation: pulse 3s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .brand-info h1 {
      font-size: 20px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }
    
    .brand-info p {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    
    .stats {
      padding: 8px 14px;
      background: rgba(0,212,170,0.12);
      border: 1px solid rgba(0,212,170,0.3);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    
    .nav {
      padding: 12px 20px;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      gap: 10px;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    
    .nav::-webkit-scrollbar { display: none; }
    
    .pill {
      flex-shrink: 0;
      padding: 10px 18px;
      border-radius: 100px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      outline: none;
    }
    
    .pill.active {
      background: var(--gradient);
      color: var(--bg-dark);
      border-color: transparent;
      box-shadow: 0 0 30px rgba(0,212,170,0.3);
      transform: scale(1.05);
    }
    
    .pill:active {
      transform: scale(0.98);
    }
    
    .viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 16px 16px 100px;
    }
    
    .stack {
      position: relative;
      width: 100%;
      height: 100%;
      max-height: 760px;
    }
    
    .card {
      position: absolute;
      inset: 0;
      background: var(--bg-card);
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
      opacity: 0;
      transform: translateY(30px) scale(0.95);
      pointer-events: none;
    }
    
    .card.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      z-index: 10;
      pointer-events: auto;
    }
    
    .card.next {
      opacity: 0.4;
      transform: translateY(20px) scale(0.97);
      z-index: 5;
    }
    
    .card.exit {
      opacity: 0;
      transform: translateY(-50px) scale(0.9);
      z-index: 15;
    }
    
    .card-header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .badge {
      padding: 6px 12px;
      background: rgba(0,212,170,0.15);
      border: 1px solid rgba(0,212,170,0.4);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    
    .time {
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    
    .media {
      width: calc(100% - 40px);
      height: 280px;
      margin: 0 20px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
    }
    
    .media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.9) saturate(1.1);
    }
    
    .media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(10,14,20,0.7) 100%);
    }
    
    .media-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      padding: 6px 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      z-index: 1;
    }
    
    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    
    .title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    
    .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    
    .points {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 24px;
    }
    
    .points li {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gradient);
      margin-top: 9px;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(0,212,170,0.5);
    }
    
    .points span {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    
    .takeaway {
      padding: 16px;
      background: rgba(0,212,170,0.08);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      margin-top: auto;
    }
    
    .takeaway strong {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      display: block;
      margin-bottom: 8px;
    }
    
    .takeaway p {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-secondary);
      font-style: italic;
    }
    
    .footer {
      padding: 0 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex-shrink: 0;
    }
    
    .actions {
      display: flex;
      gap: 12px;
    }
    
    .btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      outline: none;
    }
    
    .btn-primary {
      flex: 1;
      padding: 16px 24px;
      background: var(--gradient);
      border-radius: 100px;
      font-size: 16px;
      color: var(--bg-dark);
      box-shadow: 0 8px 20px rgba(0,212,170,0.3);
    }
    
    .btn-primary:active { transform: scale(0.96); }
    
    .btn-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      font-size: 24px;
      color: var(--text-secondary);
    }
    
    .btn-icon:active { transform: scale(0.9); }
    
    .btn-icon.saved {
      background: rgba(0,212,170,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .progress-bar {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--gradient);
      border-radius: 100px;
      transition: width 0.5s;
      box-shadow: 0 0 10px rgba(0,212,170,0.5);
    }
    
    .progress-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    
    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-secondary);
      pointer-events: none;
      z-index: 50;
      animation: bounce 2.5s ease-in-out infinite;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }
    
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      height: 100%;
    }
    
    .empty-icon { font-size: 80px; opacity: 0.3; margin-bottom: 20px; }
    .empty h3 { font-size: 24px; margin-bottom: 12px; }
    .empty p { font-size: 16px; color: var(--text-secondary); line-height: 1.6; max-width: 300px; }
    
    @media (max-width: 480px) {
      .app { max-width: 100%; }
      .media { height: 240px; }
      .title { font-size: 24px; }
      .subtitle { font-size: 15px; }
      .points span { font-size: 15px; }
    }
    
    @media (min-height: 800px) {
      .media { height: 320px; }
    }
    
    @media (max-height: 700px) {
      .media { height: 200px; }
      .title { font-size: 22px; }
    }
  </style>
</head>

      // State management
      var STORAGE_KEY = 'scrollwise_v5';
      
      var appState = {
        currentCategory: 'ai',
        lessonIndices: {},
        bookmarkedIds: [],
        totalViewed: 0,
        streakDays: 1
      };
      
      function saveState() {
        try {
          var data = {
            currentCategory: appState.currentCategory,
            lessonIndices: appState.lessonIndices,
            bookmarkedIds: appState.bookmarkedIds,
            totalViewed: appState.totalViewed,
            streakDays: appState.streakDays
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
          console.error('Failed to save state:', e);
        }
      }
      
      function loadState() {
        try {
          var savedData = localStorage.getItem(STORAGE_KEY);
          if (savedData) {
            var parsed = JSON.parse(savedData);
            appState.currentCategory = parsed.currentCategory || 'ai';
            appState.lessonIndices = parsed.lessonIndices || {};
            appState.bookmarkedIds = parsed.bookmarkedIds || [];
            appState.totalViewed = parsed.totalViewed || 0;
            appState.streakDays = parsed.streakDays || 1;
          }
        } catch (e) {
          console.error('Failed to load state:', e);
        }
      }
      
      function getCurrentIndex() {
        return appState.lessonIndices[appState.currentCategory] || 0;
      }
      
      function setCurrentIndex(newIndex) {
        appState.lessonIndices[appState.currentCategory] = newIndex;
        saveState();
      }
      
      function getLessonsForCategory(categoryId) {
        if (categoryId === 'bookmarks') {
          var bookmarked = [];
          for (var catKey in LESSONS) {
            if (LESSONS.hasOwnProperty(catKey)) {
              var lessons = LESSONS[catKey];
              for (var i = 0; i < lessons.length; i++) {
                if (appState.bookmarkedIds.indexOf(lessons[i].id) !== -1) {
                  bookmarked.push(lessons[i]);
                }
              }
            }
          }
          
          if (bookmarked.length === 0) {
            return [{
              id: 'empty',
              title: 'No Saved Lessons Yet',
              subtitle: 'Tap the bookmark icon to save lessons here',
              points: [
                'Bookmarks save locally on your device',
                'No account required—everything stays private',
                'Build your personal knowledge library'
              ],
              duration: '30 sec',
              tag: 'Get Started',
              image: 'https://images.unsplash.com/photo-1516534775068-ba3e7458af70?w=800&q=80',
              takeaway: 'Start bookmarking lessons you want to review later.'
            }];
          }
          return bookmarked;
        }
        
        return LESSONS[categoryId] || [];
      }
      
      function isBookmarked(lessonId) {
        return appState.bookmarkedIds.indexOf(lessonId) !== -1;
      }
      
      function toggleBookmark(lessonId) {
        var index = appState.bookmarkedIds.indexOf(lessonId);
        if (index === -1) {
          appState.bookmarkedIds.push(lessonId);
        } else {
          appState.bookmarkedIds.splice(index, 1);
        }
        saveState();
      }
      
      // Rendering functions
      function renderNav() {
        var navBar = document.getElementById('navBar');
        if (!navBar) return;
        
        var html = '';
        for (var i = 0; i < CATEGORIES.length; i++) {
          var cat = CATEGORIES[i];
          var activeClass = cat.id === appState.currentCategory ? ' active' : '';
          html += '<button class="pill' + activeClass + '" data-category="' + cat.id + '">';
          html += '<span>' + cat.icon + '</span>';
          html += '<span>' + cat.name + '</span>';
          html += '</button>';
        }
        navBar.innerHTML = html;
        
        var pills = navBar.querySelectorAll('.pill');
        for (var j = 0; j < pills.length; j++) {
          pills[j].addEventListener('click', handleCategoryClick);
        }
      }
      
      function handleCategoryClick(e) {
        var categoryId = this.getAttribute('data-category');
        if (categoryId && categoryId !== appState.currentCategory) {
          appState.currentCategory = categoryId;
          saveState();
          renderNav();
          renderCards();
        }
      }
      
      function renderCards() {
        var stack = document.getElementById('cardStack');
        if (!stack) return;
        
        var lessons = getLessonsForCategory(appState.currentCategory);
        
        if (lessons.length === 0) {
          stack.innerHTML = '<div class="empty"><div class="empty-icon">📚</div><h3>No lessons</h3><p>Check back soon!</p></div>';
          return;
        }
        
        var currentIdx = getCurrentIndex() % lessons.length;
        var nextIdx = (currentIdx + 1) % lessons.length;
        
        var currentLesson = lessons[currentIdx];
        var nextLesson = lessons[nextIdx];
        
        stack.innerHTML = '';
        
        if (nextLesson && nextLesson.id !== currentLesson.id) {
          stack.appendChild(createCard(nextLesson, 'next', lessons.length, nextIdx));
        }
        
        stack.appendChild(createCard(currentLesson, 'active', lessons.length, currentIdx));
      }
      
      function createCard(lesson, cardClass, totalLessons, currentIndex) {
        var card = document.createElement('div');
        card.className = 'card ' + cardClass;
        
        var saved = isBookmarked(lesson.id);
        var progressPercent = Math.round(((currentIndex + 1) / totalLessons) * 100);
        
        var pointsHtml = '';
        for (var i = 0; i < lesson.points.length; i++) {
          pointsHtml += '<li><div class="dot"></div><span>' + escapeHtml(lesson.points[i]) + '</span></li>';
        }
        
        var takeawayHtml = '';
        if (lesson.takeaway) {
          takeawayHtml = '<div class="takeaway"><strong>Key Takeaway</strong><p>' + escapeHtml(lesson.takeaway) + '</p></div>';
        }
        
        var bookmarkHtml = '';
        if (lesson.id !== 'empty') {
          var bookmarkClass = saved ? ' saved' : '';
          var bookmarkIcon = saved ? '★' : '☆';
          bookmarkHtml = '<button class="btn btn-icon' + bookmarkClass + '" data-action="bookmark">' + bookmarkIcon + '</button>';
        }
        
        card.innerHTML = 
          '<div class="card-header">' +
            '<div class="badge">' + escapeHtml(lesson.tag) + '</div>' +
            '<div class="time">⏱ ' + escapeHtml(lesson.duration) + '</div>' +
          '</div>' +
          '<div class="media">' +
            '<img src="' + escapeHtml(lesson.image) + '" alt="' + escapeHtml(lesson.title) + '" loading="lazy">' +
            '<div class="media-label">✨ Quick Insight</div>' +
          '</div>' +
          '<div class="content">' +
            '<h2 class="title">' + escapeHtml(lesson.title) + '</h2>' +
            '<p class="subtitle">' + escapeHtml(lesson.subtitle) + '</p>' +
            '<ul class="points">' + pointsHtml + '</ul>' +
            takeawayHtml +
          '</div>' +
          '<div class="footer">' +
            '<div class="actions">' +
              '<button class="btn btn-primary" data-action="next"><span>Next Lesson</span><span>→</span></button>' +
              bookmarkHtml +
            '</div>' +
            '<div class="progress-wrap">' +
              '<div class="progress-bar"><div class="progress-fill" style="width:' + progressPercent + '%"></div></div>' +
              '<div class="progress-text">' + (currentIndex + 1) + ' / ' + totalLessons + '</div>' +
            '</div>' +
          '</div>';
        
        if (cardClass === 'active') {
          setTimeout(function() {
            var nextBtn = card.querySelector('[data-action="next"]');
            var bookmarkBtn = card.querySelector('[data-action="bookmark"]');
            
            if (nextBtn) {
              nextBtn.addEventListener('click', handleNextLesson);
            }
            
            if (bookmarkBtn) {
              bookmarkBtn.addEventListener('click', function() {
                handleBookmarkClick(lesson.id, bookmarkBtn);
              });
            }
            
            setupSwipeHandlers(card);
          }, 0);
        }
        
        return card;
      }
      
      function handleNextLesson() {
        var lessons = getLessonsForCategory(appState.currentCategory);
        if (lessons.length === 0) return;
        
        var activeCard = document.querySelector('.card.active');
        if (activeCard) {
          activeCard.classList.add('exit');
          activeCard.classList.remove('active');
        }
        
        appState.totalViewed++;
        var newIndex = (getCurrentIndex() + 1) % lessons.length;
        setCurrentIndex(newIndex);
        
        updateStats();
        
        setTimeout(function() {
          renderCards();
        }, 400);
      }
      
      function handleBookmarkClick(lessonId, buttonElement) {
        if (lessonId === 'empty') return;
        
        toggleBookmark(lessonId);
        
        var nowSaved = isBookmarked(lessonId);
        if (buttonElement) {
          buttonElement.className = 'btn btn-icon' + (nowSaved ? ' saved' : '');
          buttonElement.textContent = nowSaved ? '★' : '☆';
        }
        
        if (appState.currentCategory === 'bookmarks') {
          setTimeout(function() {
            renderCards();
          }, 300);
        }
      }
      
      function setupSwipeHandlers(card) {
        var startY = null;
        
        card.addEventListener('touchstart', function(e) {
          startY = e.touches[0].clientY;
        }, {passive: true});
        
        card.addEventListener('touchend', function(e) {
          if (startY === null) return;
          var endY = e.changedTouches[0].clientY;
          var deltaY = startY - endY;
          if (deltaY > 50) {
            handleNextLesson();
          }
          startY = null;
        }, {passive: true});
        
        card.addEventListener('wheel', function(e) {
          if (e.deltaY > 10) {
            handleNextLesson();
          }
        }, {passive: true});
      }
      
      function updateStats() {
        var statsEl = document.getElementById('statsText');
        if (statsEl) {
          statsEl.textContent = '🔥 Day ' + appState.streakDays + ' · ' + appState.totalViewed + ' lessons';
        }
      }
      
      function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
      
      // Initialize app
      function init() {
        try {
          loadState();
          renderNav();
          renderCards();
          updateStats();
        } catch (e) {
          console.error('Initialization error:', e);
          var stack = document.getElementById('cardStack');
          if (stack) {
            stack.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Error Loading</h3><p>Please refresh the page</p></div>';
          }
        }
      }
      
      // Run when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
      
    })();
  </script>
</body>
</html>
